{% extends "base.html" %}
{% load tailwind_filters %}
{% block title %}Agregar producto · Coffee Shop{% endblock %}
{% block content %}

<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-display font-bold text-stone-900 mb-6">Agregar producto al menú</h1>
    <div class="rounded-2xl border border-stone-200 bg-white p-8 shadow-sm">
        <form action="{% url 'create_product' %}" method="post" enctype="multipart/form-data" class="space-y-4">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit"
                class="w-full rounded-lg bg-[#6f4e37] px-6 py-3 font-semibold text-white hover:bg-[#5a3f2c] transition">
                Guardar producto
            </button>
        </form>
    </div>
    <a href="{% url 'list_product' %}" class="mt-4 inline-block text-sm text-stone-500 hover:text-stone-700">← Volver al menú</a>
</div>

{% endblock content %}
