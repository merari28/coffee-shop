{% extends "base.html" %}
{% load tailwind_filters %}
{% block title %}Agregar al pedido · Coffee Shop{% endblock %}
{% block content %}

<div class="max-w-md mx-auto">
    <h1 class="text-2xl font-display font-bold text-stone-900 mb-6">Agregar producto al pedido</h1>
    <div class="rounded-2xl border border-stone-200 bg-white p-6 shadow-sm">
        <form action="{% url 'add_to_order' %}" method="post" class="space-y-4">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="w-full rounded-lg bg-[#6f4e37] px-6 py-3 font-semibold text-white hover:bg-[#5a3f2c] transition">
                Agregar al pedido
            </button>
        </form>
    </div>
    <a href="{% url 'list_product' %}" class="mt-4 inline-block text-sm text-stone-500 hover:text-stone-700">← Volver al menú</a>
</div>

{% endblock content %}
